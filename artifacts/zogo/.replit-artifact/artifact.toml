kind = "web"
previewPath = "/"
title = "ZOGO Grocery"
version = "1.0.0"
id = "artifacts/zogo"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24099

[services.development]
run = "pnpm --filter @workspace/zogo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zogo", "run", "build" ]
serve = "static"
publicDir = "artifacts/zogo/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24099"
BASE_PATH = "/"
